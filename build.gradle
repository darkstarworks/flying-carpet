// Root project: no loader plugin here. Each loader module (fabric/, and the
// dormant neoforge/) applies its own build plugin and compiles the shared source
// from common/ alongside its loader-specific code.
//
// common/ is a plain shared-source folder (not a Gradle module). Every loader
// module adds ../common/src/main/java to its source set, so the loader-agnostic
// code is compiled once per loader against that loader's Minecraft — no cross-jar
// bundling required.

allprojects {
    group = project.maven_group
    version = project.mod_version
}
